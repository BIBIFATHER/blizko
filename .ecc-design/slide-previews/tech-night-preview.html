<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview · Tech Night</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap");
      html, body { height: 100%; margin: 0; }
      body {
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: "Manrope", sans-serif;
        color: #f5fbff;
        background:
          radial-gradient(circle at 18% 20%, rgba(88, 185, 255, 0.18), transparent 22%),
          radial-gradient(circle at 84% 24%, rgba(157, 248, 91, 0.14), transparent 20%),
          linear-gradient(180deg, #02060c 0%, #08131f 100%);
      }
      .slide {
        width: min(92vw, 1320px);
        height: min(88vh, 780px);
        padding: clamp(1.2rem, 3vw, 3rem);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 32px;
        background: rgba(8, 19, 31, 0.72);
        box-shadow: 0 30px 90px rgba(0,0,0,0.45);
        backdrop-filter: blur(14px);
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 1.2rem;
      }
      .eyebrow {
        display: inline-flex;
        width: fit-content;
        padding: 0.38rem 0.72rem;
        border-radius: 999px;
        border: 1px solid rgba(88,185,255,0.22);
        color: #8ad9ff;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 1rem 0 0.8rem;
        font-size: clamp(2.4rem, 5vw, 5.8rem);
        line-height: 0.92;
        letter-spacing: -0.06em;
        max-width: 10ch;
      }
      p {
        margin: 0;
        color: #aab8ca;
        font-size: clamp(0.95rem, 1.5vw, 1.2rem);
        line-height: 1.45;
        max-width: 48ch;
      }
      .accent { color: #9df85b; }
      .panel {
        border-radius: 24px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.03);
        padding: 1rem;
        display: grid;
        align-content: space-between;
      }
      .bars { display: grid; gap: 0.85rem; }
      .bar strong { display: block; margin-bottom: 0.35rem; font-size: 0.95rem; }
      .track { height: 10px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
      .fill { height: 100%; border-radius: inherit; }
      .blue { width: 82%; background: linear-gradient(90deg, #58b9ff, #3d7cff); }
      .green { width: 64%; background: linear-gradient(90deg, #9df85b, #53d769); }
      .gold { width: 36%; background: linear-gradient(90deg, #ffc65c, #ff9f43); }
      .footer { align-self: end; color: #6f8198; font-size: 0.85rem; }
      @media (max-width: 900px) { .slide { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <section class="slide">
      <div>
        <div class="eyebrow">Palette A · Tech Night</div>
        <h1>Будущее подбора нянь</h1>
        <p>Не больше фильтров. <span class="accent">Лучше решения.</span> Черный фон, электрический синий и лайм дают ощущение keynote про сильный AI-продукт.</p>
      </div>
      <aside class="panel">
        <div class="bars">
          <div class="bar"><strong>Технологичность</strong><div class="track"><div class="fill blue"></div></div></div>
          <div class="bar"><strong>Смелость</strong><div class="track"><div class="fill green"></div></div></div>
          <div class="bar"><strong>Теплота</strong><div class="track"><div class="fill gold"></div></div></div>
        </div>
        <div class="footer">Лучше всего для: product keynote, AI pitch, “мы строим category leader”.</div>
      </aside>
    </section>
  </body>
  </html>
