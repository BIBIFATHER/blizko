name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  smoke-e2e:
    name: Smoke E2E
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install app dependencies
        run: npm ci

      - name: Install Playwright for Python
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Start Vite dev server
        run: npm run dev -- --host 127.0.0.1 > /tmp/blizko-vite.log 2>&1 &

      - name: Wait for app
        run: |
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:3000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Vite dev server did not start"
          cat /tmp/blizko-vite.log
          exit 1

      - name: Run smoke e2e
        env:
          BASE_URL: http://127.0.0.1:3000
          E2E_SCREENSHOT_PATH: /tmp/blizko-e2e-failure.png
        run: python e2e_test.py
