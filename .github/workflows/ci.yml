name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  security-rls:
    name: Supabase RLS Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: geomyyfjvemdphaeimkz

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        if: env.SUPABASE_ACCESS_TOKEN != ''
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Run chat messages RLS smoke
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: npm run check:chat-rls

      - name: Skip without Supabase token
        if: env.SUPABASE_ACCESS_TOKEN == ''
        run: echo "SUPABASE_ACCESS_TOKEN secret is not configured; skipping live RLS smoke."

  smoke-e2e:
    name: Smoke E2E
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install app dependencies
        run: npm ci

      - name: Install Playwright for Python
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Start Vite dev server
        run: npm run dev -- --host 127.0.0.1 > /tmp/blizko-vite.log 2>&1 &

      - name: Wait for app
        run: |
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:3000 > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Vite dev server did not start"
          cat /tmp/blizko-vite.log
          exit 1

      - name: Run smoke e2e
        env:
          BASE_URL: http://127.0.0.1:3000
          E2E_SCREENSHOT_PATH: /tmp/blizko-e2e-failure.png
        run: python e2e_test.py
