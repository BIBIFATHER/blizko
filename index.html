    <!-- Splash screen -->
    <style>
      #blizko-splash {
        position: fixed;
        inset: 0;
        z-index: 10000;
        background-color: #f9f6f2;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.45s ease-out;
      }
      #blizko-splash.splash-exiting {
        opacity: 0;
        pointer-events: none;
      }
      .splash-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(18px, 1.2vw + 14px, 26px);
      }
      /* Логотип масштабируется по ширине вьюпорта: ~80px на телефоне, до 120px на десктопе */
      .splash-mark {
        position: relative;
        width: clamp(80px, 6vw + 56px, 120px);
        height: clamp(80px, 6vw + 56px, 120px);
      }
      .splash-arc-svg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      /* Дуга «прорисовывается» (stroke draw-on) — premium-ощущение, pathLength=1 нормирует длину */
      .splash-arc-svg path {
        stroke-dasharray: 1;
        stroke-dashoffset: 1;
        animation: splash-draw 0.8s cubic-bezier(0.45, 0, 0.15, 1) 0.15s forwards;
      }
      .splash-dot {
        position: absolute;
        width: 17.5%;
        height: 17.5%;
        border-radius: 50%;
        background: #c4744a;
        top: 41.25%;
        left: 57.5%;
        /* мягкая посадка точки внахлёст с хвостом дуги (деликатный overshoot) */
        animation: splash-dot-in 0.45s cubic-bezier(0.34, 1.4, 0.64, 1) 0.85s both;
      }
      .splash-wordmark {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: clamp(30px, 2.2vw + 21px, 44px);
        font-weight: 600;
        color: #1c2b2d;
        letter-spacing: -0.02em;
        line-height: 1;
        animation: splash-up 0.55s cubic-bezier(0.16, 1, 0.3, 1) 1.15s both;
      }
      @keyframes splash-draw {
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes splash-dot-in {
        from {
          transform: scale(0);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes splash-up {
        from {
          transform: translateY(10px) scale(0.98);
          opacity: 0;
        }
        to {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-arc-svg path {
          animation: none;
          stroke-dashoffset: 0;
        }
        .splash-dot,
        .splash-wordmark {
          animation: none;
          opacity: 1;
        }
        #blizko-splash.splash-exiting {
          transition: none;
        }
      }
    </style>

    <!-- Service Worker: only in PROD -->
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;

        const isLocalhost =
          location.hostname === 'localhost' ||
          location.hostname === '127.0.0.1' ||
          location.hostname === '[::1]';

        if (isLocalhost) {
          // DEV — гарантированно убираем SW, если он когда-то был установлен
          navigator.serviceWorker
            .getRegistrations()
            .then((regs) => Promise.all(regs.map((r) => r.unregister())))
            .then(() => console.log('[SW] disabled in dev (localhost)'))
            .catch(() => {});
          return;
        }

        // PROD — регистрируем SW
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js', { updateViaCache: 'none' })
            .then(() => console.log('[SW] registered'))
            .catch((err) => console.log('[SW] failed', err));
        });
      })();
    </script>
