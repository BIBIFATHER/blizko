    <!-- Service Worker: only in PROD -->
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;

        const isLocalhost =
          location.hostname === 'localhost' ||
          location.hostname === '127.0.0.1' ||
          location.hostname === '[::1]';

        if (isLocalhost) {
          // DEV — гарантированно убираем SW, если он когда-то был установлен
          navigator.serviceWorker
            .getRegistrations()
            .then((regs) => Promise.all(regs.map((r) => r.unregister())))
            .then(() => console.log('[SW] disabled in dev (localhost)'))
            .catch(() => {});
          return;
        }

        // PROD — регистрируем SW
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then(() => console.log('[SW] registered'))
            .catch((err) => console.log('[SW] failed', err));
        });
      })();
    </script>
