<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content, viewport-fit=cover"
  />
  <title>Blizko — Peace of mind for every family</title>

  <!-- iOS support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Blizko" />

  <link rel="stylesheet" href="/index.css" />
</head>

<body>
  <div id="root"></div>

  <!-- Service Worker: only in PROD -->
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;

      const isLocalhost =
        location.hostname === 'localhost' ||
        location.hostname === '127.0.0.1' ||
        location.hostname === '[::1]';

      if (isLocalhost) {
        // DEV — гарантированно убираем SW, если он когда-то был установлен
        navigator.serviceWorker.getRegistrations()
          .then((regs) => Promise.all(regs.map((r) => r.unregister())))
          .then(() => console.log('[SW] disabled in dev (localhost)'))
          .catch(() => {});
        return;
      }

      // PROD — регистрируем SW
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(() => console.log('[SW] registered'))
          .catch((err) => console.log('[SW] failed', err));
      });
    })();
  </script>

  <script type="module" src="/index.tsx"></script>
</body>
</html>
