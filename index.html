    <!-- Splash screen -->
    <style>
      #blizko-splash {
        position: fixed;
        inset: 0;
        z-index: 10000;
        background-color: #F9F6F2;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.45s ease-out;
      }
      #blizko-splash.splash-exiting {
        opacity: 0;
        pointer-events: none;
      }
      .splash-logo {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }
      .splash-mark {
        position: relative;
        width: 80px;
        height: 80px;
      }
      .splash-arc-svg {
        position: absolute;
        top: 0; left: 0;
        animation: splash-arc-in 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
      }
      .splash-dot {
        position: absolute;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #C4744A;
        top: 33px;
        left: 46px;
        animation: splash-dot-in 0.45s cubic-bezier(0.16, 1, 0.3, 1) 0.55s both;
      }
      .splash-wordmark {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 30px;
        font-weight: 600;
        color: #1C2B2D;
        letter-spacing: -0.02em;
        line-height: 1;
        animation: splash-up 0.5s ease-out 0.95s both;
      }
      @keyframes splash-arc-in {
        from { transform: translateX(-18px) scale(0.85); opacity: 0; }
        to   { transform: translateX(0)     scale(1);    opacity: 1; }
      }
      @keyframes splash-dot-in {
        from { transform: scale(0); opacity: 0; }
        to   { transform: scale(1); opacity: 1; }
      }
      @keyframes splash-up {
        from { transform: translateY(10px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        .splash-arc-svg, .splash-dot, .splash-wordmark { animation: none; opacity: 1; }
        #blizko-splash.splash-exiting { transition: none; }
      }
    </style>

      </div>
    </div>

    <div id="root"></div>

    <!-- Service Worker: only in PROD -->
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return;

        const isLocalhost =
          location.hostname === 'localhost' ||
          location.hostname === '127.0.0.1' ||
          location.hostname === '[::1]';

        if (isLocalhost) {
          // DEV — гарантированно убираем SW, если он когда-то был установлен
          navigator.serviceWorker
            .getRegistrations()
            .then((regs) => Promise.all(regs.map((r) => r.unregister())))
            .then(() => console.log('[SW] disabled in dev (localhost)'))
            .catch(() => {});
          return;
        }

        // PROD — регистрируем SW
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js')
            .then(() => console.log('[SW] registered'))
            .catch((err) => console.log('[SW] failed', err));
        });
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
