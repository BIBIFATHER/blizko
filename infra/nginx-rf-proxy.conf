# Nginx reverse proxy for blizko.app on a Russian VPS (Timeweb / Selectel)
#
# Purpose: proxy all traffic through a Russian IP to avoid Vercel CDN
# being unreachable on certain Russian mobile networks.
#
# Setup:
#   1. Get a VPS in Russia (Timeweb Cloud nano ~500 RUB/month is enough)
#   2. Install nginx + certbot: apt install nginx certbot python3-certbot-nginx
#   3. Place this file at /etc/nginx/sites-available/blizko and symlink to sites-enabled
#   4. Run: certbot --nginx -d blizko.app -d www.blizko.app
#   5. In Cloudflare: set DNS A record for blizko.app → this VPS IP (orange cloud ON)
#      Cloudflare will now route through this Russian server instead of directly to Vercel.
#
# Vercel origin IP: find it by temporarily pausing CF proxy and running: dig blizko.app
# Or check Vercel dashboard → project → domains → "assigned to".

proxy_cache_path /var/cache/nginx/blizko
    levels=1:2
    keys_zone=blizko_cache:10m
    max_size=500m
    inactive=7d
    use_temp_path=off;

upstream vercel_origin {
    # Replace with the actual Vercel origin IP or cname.vercel-dns.com
    server 76.76.21.21:443;
    keepalive 32;
}

server {
    listen 80;
    server_name blizko.app www.blizko.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name blizko.app www.blizko.app;

    # Certificates managed by certbot
    ssl_certificate     /etc/letsencrypt/live/blizko.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blizko.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Accept Cloudflare real IPs (optional but useful for logging)
    real_ip_header CF-Connecting-IP;

    # Cache JS/CSS bundles (hashed filenames — safe to cache long-term)
    location ~* ^/assets/ {
        proxy_pass https://vercel_origin;
        proxy_ssl_name blizko.app;
        proxy_ssl_server_name on;
        proxy_set_header Host blizko.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cache blizko_cache;
        proxy_cache_valid 200 365d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Static files (icons, manifest, sw.js) — shorter cache
    location ~* \.(png|ico|svg|webmanifest|txt)$ {
        proxy_pass https://vercel_origin;
        proxy_ssl_name blizko.app;
        proxy_ssl_server_name on;
        proxy_set_header Host blizko.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_cache blizko_cache;
        proxy_cache_valid 200 7d;
        proxy_cache_use_stale error timeout;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Everything else — pass through without caching (HTML, API, SW)
    location / {
        proxy_pass https://vercel_origin;
        proxy_ssl_name blizko.app;
        proxy_ssl_server_name on;
        proxy_set_header Host blizko.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}
