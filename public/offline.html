<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blizko — Нет подключения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #FAFAF9 0%, #F5F0F7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            color: #44403C;
        }

        .container {
            text-align: center;
            max-width: 360px;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: #1C1917;
        }

        p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #78716C;
            margin-bottom: 2rem;
        }

        button {
            background: #6C2586;
            color: white;
            border: none;
            padding: 0.875rem 2rem;
            border-radius: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(108, 37, 134, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(108, 37, 134, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>Нет подключения к интернету</h1>
        <p>Проверьте Wi-Fi или мобильные данные и попробуйте снова. Мы скоро вернёмся!</p>
        <button onclick="location.reload()">Попробовать снова</button>
    </div>
</body>

</html>
